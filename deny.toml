# cargo-deny configuration for Analemma-GVM
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# rustls-pemfile: unmaintained but functional, migration to rustls-pki-types planned.
ignore = [
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained
    # Rand unsound with custom logger — GVM does not use custom loggers
    # with rand::rng(). NEEDS-REVIEW for v0.5.
    "RUSTSEC-2026-0092",
    # Additional advisories discovered 2026-04-11 CI.
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

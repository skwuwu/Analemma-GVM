# cargo-deny configuration for Analemma-GVM
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Reviewed 2026-04-13. See audit.toml for full reachability assessments.
ignore = [
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained — used, low risk
    "RUSTSEC-2026-0092",  # wasmtime UTF-16 panic — wasm feature disabled
    "RUSTSEC-2026-0097",  # rand::rng() unsound — GVM uses rand::random() only
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# cargo-deny configuration for Analemma-GVM
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities
vulnerability = "deny"
# Ignore wasmtime CVEs — Wasm engine is NOT on hot path (native fallback is default).
# Upgrading wasmtime 29 → 41+ is a major breaking change. These CVEs affect
# WASI guests, not the proxy itself. Will be addressed when Wasm is activated.
ignore = [
    "RUSTSEC-2026-0021",  # wasmtime: panic in wasi:http/types.fields
    "RUSTSEC-2026-0020",  # wasmtime: guest-controlled resource exhaustion
    "RUSTSEC-2025-0046",  # wasmtime: fd_renumber panic
    "RUSTSEC-2026-0006",  # wasmtime: f64.copysign segfault
    "RUSTSEC-2025-0118",  # wasmtime: unsound shared memory API
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

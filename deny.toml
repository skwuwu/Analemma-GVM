# cargo-deny configuration for Analemma-GVM
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# wasmtime is behind --features wasm (disabled by default, not compiled into
# the default binary). Ignore its CVEs until we upgrade or remove it.
ignore = [
    "RUSTSEC-2025-0046",  # wasmtime: fd_renumber panic (optional dep)
    "RUSTSEC-2025-0118",  # wasmtime: shared memory unsoundness (optional dep)
    "RUSTSEC-2026-0006",  # wasmtime: f64.copysign segfault (optional dep)
    "RUSTSEC-2026-0020",  # wasmtime: WASI resource exhaustion (optional dep)
    "RUSTSEC-2026-0021",  # wasmtime: fields instance panic (optional dep)
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained (migration planned)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

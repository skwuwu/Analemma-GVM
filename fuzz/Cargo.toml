[package]
name = "gvm-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
gvm-proxy = { path = ".." }
gvm-types = { path = "../crates/gvm-types" }
serde_json = "1"
tempfile = "3"

# SRR rule matching fuzzer: exercises regex compilation + pattern matching
[[bin]]
name = "fuzz_srr"
path = "fuzz_targets/fuzz_srr.rs"
doc = false

# WAL JSON parsing fuzzer: exercises event deserialization
[[bin]]
name = "fuzz_wal_parse"
path = "fuzz_targets/fuzz_wal_parse.rs"
doc = false

# SRR rules for stress testing.
#
# Design principle: agents must run unimpeded. Stress testing measures proxy
# stability under sustained traffic, NOT policy correctness (that's E2E tests).
#
# - LLM APIs: Allow (agent cannot function without these)
# - Agent tool APIs: Allow (GitHub, public data APIs)
# - Deny rules: only on domains agents never call (WAL verification only)
# - No catch-all delay (was causing OpenClaw Connection errors via SSE timeout)

# ── Allow: LLM APIs (critical — agents die without these) ──
[[rules]]
method = "*"
pattern = "api.anthropic.com/{any}"
decision = { type = "Allow" }
label = "stress-llm-anthropic"

[[rules]]
method = "*"
pattern = "api.openai.com/{any}"
decision = { type = "Allow" }
label = "stress-llm-openai"

# ── Allow: GitHub (agent tool targets) ──
[[rules]]
method = "GET"
pattern = "api.github.com/{any}"
decision = { type = "Allow" }
label = "stress-github-api"

[[rules]]
method = "GET"
pattern = "raw.githubusercontent.com/{any}"
decision = { type = "Allow" }
label = "stress-raw-github"

# ── Allow: public data APIs (agent tool targets) ──
[[rules]]
method = "GET"
pattern = "catfact.ninja/{any}"
decision = { type = "Allow" }
label = "stress-catfact"

[[rules]]
method = "GET"
pattern = "dog.ceo/{any}"
decision = { type = "Allow" }
label = "stress-dog"

[[rules]]
method = "GET"
pattern = "numbersapi.com/{any}"
decision = { type = "Allow" }
label = "stress-numbersapi"

[[rules]]
method = "GET"
pattern = "official-joke-api.appspot.com/{any}"
decision = { type = "Allow" }
label = "stress-jokes"

# ── Deny: domains agents never call (WAL verification only) ──
[[rules]]
method = "*"
pattern = "webhook.site/{any}"
decision = { type = "Deny", reason = "Exfiltration target (stress WAL check)" }
label = "stress-deny-webhook"

[[rules]]
method = "*"
pattern = "evil-exfil.attacker.com/{any}"
decision = { type = "Deny", reason = "Exfiltration target (stress WAL check)" }
label = "stress-deny-exfil"

[[rules]]
method = "DELETE"
pattern = "{any}"
decision = { type = "Deny", reason = "DELETE blocked globally" }
label = "stress-deny-delete"

# ── Default: Allow unknown domains ──
# Stress test priority is agent uptime, not policy enforcement.
# Unknown domains get Allow so agents never stall on unregistered URLs.
[[rules]]
method = "*"
pattern = "{any}"
decision = { type = "Allow" }
label = "stress-default-allow"

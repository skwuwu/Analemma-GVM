# Global policy layer — applies to all tenants/agents, cannot be overridden.

# ── Priority 1: Critical external operations are blocked ──

[[rules]]
id = "global-critical-external-send-deny"
priority = 1
layer = "Global"
description = "Block sending critical data to external targets (exfiltration)"

[[rules.conditions]]
field = "resource.sensitivity"
operator = "Eq"
value = "Critical"

[[rules.conditions]]
field = "resource.tier"
operator = "Eq"
value = "External"

[rules.decision]
type = "Deny"
reason = "Critical data transfer to external target is forbidden"

# ──

[[rules]]
id = "global-payment-charge-approval"
priority = 2
layer = "Global"
description = "Payment charges require approval"

[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.payment.charge"

[rules.decision]
type = "RequireApproval"
urgency = "Immediate"

# ──

[[rules]]
id = "global-storage-delete-deny"
priority = 3
layer = "Global"
description = "Critical data deletion is forbidden"

[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.storage.delete"

[[rules.conditions]]
field = "resource.sensitivity"
operator = "Eq"
value = "Critical"

[rules.decision]
type = "Deny"
reason = "Critical data deletion is forbidden"

# ──

[[rules]]
id = "global-critical-read-deny"
priority = 4
layer = "Global"
description = "Critical sensitivity reads are blocked (credentials, secrets)"

[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.storage.read"

[[rules.conditions]]
field = "resource.sensitivity"
operator = "Eq"
value = "Critical"

[rules.decision]
type = "Deny"
reason = "Access to critical/secret data requires elevated permissions"

# ── Priority 10: Customer-facing delays ──

[[rules]]
id = "global-customer-facing-delay"
priority = 10
layer = "Global"
description = "Customer-facing actions get 300ms safety delay"

[[rules.conditions]]
field = "resource.tier"
operator = "Eq"
value = "CustomerFacing"

[rules.decision]
type = "Delay"
milliseconds = 300

# ── Priority 50: Safe read operations ──

[[rules]]
id = "global-read-allow"
priority = 50
layer = "Global"
description = "Non-critical read operations are allowed"

[[rules.conditions]]
field = "operation"
operator = "EndsWith"
value = ".read"

[rules.decision]
type = "Allow"

# ──

[[rules]]
id = "global-query-allow"
priority = 50
layer = "Global"
description = "Query/analytics operations are allowed"

[[rules.conditions]]
field = "operation"
operator = "EndsWith"
value = ".query"

[rules.decision]
type = "Allow"

# ──

[[rules]]
id = "global-status-allow"
priority = 50
layer = "Global"
description = "Infrastructure status checks are allowed"

[[rules.conditions]]
field = "operation"
operator = "EndsWith"
value = ".status"

[rules.decision]
type = "Allow"

# ──

[[rules]]
id = "global-refund-lookup-allow"
priority = 50
layer = "Global"
description = "Refund lookups (read-only) are allowed"

[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.payment.refund_lookup"

[rules.decision]
type = "Allow"

# ── Priority 999: Default fallback ──

[[rules]]
id = "global-fallback"
priority = 999
layer = "Global"
description = "Default: Delay 300ms (Fail-Close)"

[rules.decision]
type = "Delay"
milliseconds = 300

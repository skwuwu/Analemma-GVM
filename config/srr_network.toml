# -- _default.toml --
# GVM Default Ruleset
# Applied when no skill-specific ruleset matches.
# Unknown domains → Shadow cautious mode (Delay + audit log).

[[rules]]
pattern = "localhost/*"
method = "*"
decision = { type = "Allow" }
reason = "Localhost traffic (local tools, canvas, obsidian)"

[[rules]]
pattern = "127.0.0.1/*"
method = "*"
decision = { type = "Allow" }
reason = "Loopback traffic"

# Default-to-Caution: unknown domains get delayed and logged.
# Review logs with `gvm audit list` to discover new domains,
# then add explicit rules or install a skill-specific ruleset.

# -- github.toml --
# GVM Ruleset: GitHub
# Covers: github skill, gh-issues skill, coding-agent skill
# Domains: api.github.com

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls$"
method = "GET"
decision = { type = "Allow" }
reason = "List pull requests (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls/.*$"
method = "GET"
decision = { type = "Allow" }
reason = "Get pull request details (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues$"
method = "GET"
decision = { type = "Allow" }
reason = "List issues (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/.*$"
method = "GET"
decision = { type = "Allow" }
reason = "Get issue details (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/actions/runs$"
method = "GET"
decision = { type = "Allow" }
reason = "List CI runs (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/commits$"
method = "GET"
decision = { type = "Allow" }
reason = "List commits (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/labels$"
method = "GET"
decision = { type = "Allow" }
reason = "List labels (read-only)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/contents/.*$"
method = "GET"
decision = { type = "Allow" }
reason = "Read file contents (read-only)"

# Write operations -- Delay for audit trail
[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Create issue (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/[^/]+/comments$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Add comment (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls$"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Create pull request (write -- delayed for audit)"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/issues/.*$"
method = "PATCH"
decision = { type = "Delay", milliseconds = 300 }
reason = "Update issue/PR (write -- delayed for audit)"

# Deny dangerous operations
[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/git/refs/.*"
method = "DELETE"
decision = { type = "Deny", reason = "Delete branch (destructive -- blocked)" }

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+/[^/]+/pulls/[^/]+/merge$"
method = "PUT"
decision = { type = "Deny", reason = "PR merge blocked (manual only)" }
description = "GitHub: PR merge blocked"

[[rules]]
pattern = "api.github.com"
path_regex = "^/repos/[^/]+$"
method = "DELETE"
decision = { type = "Deny", reason = "Repository deletion blocked" }
description = "GitHub: repo delete blocked"

# -- slack.toml --
# GVM Ruleset: Slack
# Covers: slack skill
# Domains: slack.com

# Read operations -- Allow
[[rules]]
pattern = "slack.com/api/conversations.history"
method = "POST"
decision = { type = "Allow" }
reason = "Read channel messages (read-only)"

[[rules]]
pattern = "slack.com/api/conversations.list"
method = "GET"
decision = { type = "Allow" }
reason = "List channels (read-only)"

[[rules]]
pattern = "slack.com/api/users.info"
method = "GET"
decision = { type = "Allow" }
reason = "Get user info (read-only)"

[[rules]]
pattern = "slack.com/api/emoji.list"
method = "GET"
decision = { type = "Allow" }
reason = "List emoji (read-only)"

[[rules]]
pattern = "slack.com/api/reactions.get"
method = "GET"
decision = { type = "Allow" }
reason = "Get reactions (read-only)"

[[rules]]
pattern = "slack.com/api/pins.list"
method = "GET"
decision = { type = "Allow" }
reason = "List pins (read-only)"

# Write operations -- Delay
[[rules]]
pattern = "slack.com/api/chat.postMessage"
method = "POST"
decision = { type = "Delay", milliseconds = 500 }
reason = "Send message (write -- delayed for audit)"

[[rules]]
pattern = "slack.com/api/reactions.add"
method = "POST"
decision = { type = "Allow" }
reason = "Add reaction (low-risk write)"

[[rules]]
pattern = "slack.com/api/pins.add"
method = "POST"
decision = { type = "Delay", milliseconds = 300 }
reason = "Pin message (write -- delayed for audit)"

# Destructive -- Deny
[[rules]]
pattern = "slack.com/api/chat.delete"
method = "POST"
decision = { type = "Deny", reason = "Delete message (destructive -- blocked)" }

[[rules]]
pattern = "slack.com/api/chat.update"
method = "POST"
decision = { type = "Delay", milliseconds = 1000 }
reason = "Edit message (write -- 1s delay for audit)"

[[rules]]
pattern = "slack.com/api/conversations.archive"
method = "POST"
decision = { type = "Deny", reason = "Channel archive blocked" }
description = "Slack: archive channel blocked"

[[rules]]
pattern = "slack.com/api/conversations.kick"
method = "POST"
decision = { type = "Deny", reason = "Channel kick blocked" }
description = "Slack: kick user blocked"

[[rules]]
pattern = "slack.com/api/files.upload"
method = "POST"
decision = { type = "Delay", milliseconds = 3000 }
description = "Slack: file upload (3s delay)"

# -- web-browsing.toml --
# GVM Ruleset: Web Browsing & Search
# Covers: brave-search, firecrawl, tavily, xurl, web_search/web_fetch tools
# Search APIs allowed. Arbitrary POST to unknown domains handled by Shadow Mode.

# ── Brave Search ──

[[rules]]
pattern = "api.search.brave.com/*"
method = "GET"
decision = { type = "Allow" }
description = "Brave Search: query"

# ── Firecrawl ──

[[rules]]
pattern = "api.firecrawl.dev/v1/scrape"
method = "POST"
decision = { type = "Allow" }
description = "Firecrawl: scrape page"

[[rules]]
pattern = "api.firecrawl.dev/v1/crawl"
method = "POST"
decision = { type = "Delay", milliseconds = 1000 }
description = "Firecrawl: crawl site (1s delay)"

[[rules]]
pattern = "api.firecrawl.dev/v1/crawl/*"
method = "GET"
decision = { type = "Allow" }
description = "Firecrawl: check crawl status"

# ── Tavily ──

[[rules]]
pattern = "api.tavily.com/search"
method = "POST"
decision = { type = "Allow" }
description = "Tavily: search"

[[rules]]
pattern = "api.tavily.com/extract"
method = "POST"
decision = { type = "Allow" }
description = "Tavily: extract content"

# ── Serper (Google Search API) ──

[[rules]]
pattern = "google.serper.dev/search"
method = "POST"
decision = { type = "Allow" }
description = "Serper: Google search"


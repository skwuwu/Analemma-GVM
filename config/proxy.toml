[server]
listen = "0.0.0.0:8080"

[enforcement]
default_decision = { type = "Delay", milliseconds = 300 }
ic1_async_ledger = true
ic1_loss_threshold = 0.001

# Agent block response modes: halt | soft_pivot | rollback
# Controls what action hint agents receive when an operation is blocked.
[enforcement.on_block]
deny = "halt"                    # Deny: stop execution immediately
require_approval = "soft_pivot"  # IC-3: suggest alternatives, allow retry
throttle = "rollback"            # Rate limit: roll back and retry later
infrastructure_failure = "halt"  # WAL/disk failure: halt for safety

[nats]
url = "nats://localhost:4222"
stream = "gvm-audit"
max_age_days = 2555

[redis]
url = "redis://localhost:6379"

[wal]
# batch_window_ms = 2          # Group commit window (higher = more throughput, more latency)
# max_batch_size = 128          # Max events per batch before forced flush
# max_wal_bytes = 104857600     # 100MB — triggers rotation to wal.log.<N>
# max_wal_segments = 10         # Keep N rotated segments, prune oldest

[srr]
network_file = "config/srr_network.toml"
semantic_file = "config/srr_semantic.toml"
hot_reload = true

[policies]
directory = "config/policies/"
hot_reload = true

[operations]
registry_file = "config/operation_registry.toml"

[secrets]
file = "config/secrets.toml"
key_env = "GVM_SECRETS_KEY"

# Dev-only: remap external hosts to local mock server.
# Ignored when GVM_ENV=production.
[dev]
host_overrides = { "gmail.googleapis.com" = "127.0.0.1:9090", "api.bank.com" = "127.0.0.1:9090", "api.internal.dev" = "127.0.0.1:9090", "evil-exfil.attacker.com" = "127.0.0.1:9090", "webhook.external-dump.com" = "127.0.0.1:9090" }

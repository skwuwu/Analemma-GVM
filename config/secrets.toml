# API credentials keyed by host.
# In production, this file must be encrypted (secrets.toml.enc).
# For development, plaintext TOML is acceptable.

# Example:
# [credentials."api.slack.com"]
# type = "Bearer"
# token = "xoxb-your-slack-token"
#
# [credentials."api.stripe.com"]
# type = "ApiKey"
# header = "Authorization"
# value = "Bearer sk_test_your-stripe-key"

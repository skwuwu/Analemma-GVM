# Finance Global Policy — strict by default.
# All payments require approval. Transfers denied. Read-only allowed.

[[rules]]
id = "finance-payment-approval"
priority = 1
layer = "Global"
description = "All payment operations require IC-3 approval"
decision = { type = "RequireApproval", urgency = "Immediate" }
[[rules.conditions]]
field = "operation"
operator = "StartsWith"
value = "gvm.payment"

[[rules]]
id = "finance-transfer-deny"
priority = 2
layer = "Global"
description = "Wire transfers are unconditionally denied"
decision = { type = "Deny", reason = "Wire transfers require offline authorization" }
[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.payment.charge"
[[rules.conditions]]
field = "resource.sensitivity"
operator = "Eq"
value = "Critical"

[[rules]]
id = "finance-delete-deny"
priority = 3
layer = "Global"
description = "Critical data deletion is forbidden"
decision = { type = "Deny", reason = "Financial record deletion is prohibited" }
[[rules.conditions]]
field = "operation"
operator = "Eq"
value = "gvm.storage.delete"
[[rules.conditions]]
field = "resource.sensitivity"
operator = "Eq"
value = "Critical"

[[rules]]
id = "finance-customer-facing-delay"
priority = 10
layer = "Global"
description = "Customer-facing operations get 500ms review window"
decision = { type = "Delay", milliseconds = 500 }
[[rules.conditions]]
field = "resource.tier"
operator = "Eq"
value = "CustomerFacing"

[[rules]]
id = "finance-read-allow"
priority = 100
layer = "Global"
description = "Read operations are allowed (IC-1)"
decision = { type = "Allow" }
[[rules.conditions]]
field = "operation"
operator = "EndsWith"
value = ".read"

[[rules]]
id = "finance-fallback"
priority = 999
layer = "Global"
description = "Default: delay 500ms (Fail-Close)"
decision = { type = "Delay", milliseconds = 500 }

# GVM Proxy — SaaS Template
# Balanced enforcement for Slack/email/CRM operations.

[server]
listen = "0.0.0.0:8080"

[enforcement]
default_decision = { type = "Delay", milliseconds = 300 }
ic1_async_ledger = true
ic1_loss_threshold = 0.001

# SaaS: balanced — allow soft pivot for approvals
[enforcement.on_block]
deny = "halt"
require_approval = "soft_pivot"
throttle = "rollback"
infrastructure_failure = "halt"

[nats]
url = "nats://127.0.0.1:4222"
stream = "gvm-audit-saas"
max_age_days = 365

[redis]
url = "redis://127.0.0.1:6379"

[srr]
network_file = "config/templates/saas/srr_network.toml"
semantic_file = "config/srr_semantic.toml"
hot_reload = true

[policies]
directory = "config/templates/saas/policies/"
hot_reload = true

[operations]
registry_file = "config/operation_registry.toml"

[secrets]
file = "config/secrets.toml"
key_env = "GVM_SECRETS_KEY"

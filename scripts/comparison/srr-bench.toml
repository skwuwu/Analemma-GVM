# SRR ruleset for GVM-side of the OPA+Envoy comparison benchmark.
#
# Bench target is the synthetic hostname `bench.local`, mapped to the
# EC2 host's primary IP via /etc/hosts (bench.sh sets + cleans up the
# /etc/hosts entry around each run). The agent inside `gvm run
# --sandbox` resolves bench.local via the host's /etc/hosts (visible to
# the sandbox via overlayfs), connects to that IP:9999, gets intercepted
# by GVM's iptables DNAT, and gvm-proxy applies these rules using
# host=bench.local:9999 (preserved from the Host header).
#
# Allow / Deny discrimination is by path + method (host is constant
# across scenarios). Matches the Rego policy in policy.rego.

# ── Rule 1: Deny POST to /transfer ────────────────────────────────────
[[rules]]
method = "POST"
pattern = "bench.local:9999/transfer"
decision = { type = "Deny", reason = "Bench deny scenario" }
description = "Bench deny endpoint"
label = "bench-deny"

# ── Rule 2: Allow everything else on the bench host ───────────────────
[[rules]]
method = "*"
pattern = "bench.local:9999/{any}"
decision = { type = "Allow" }
description = "Bench allow catch-all on the mock upstream"
label = "bench-allow"

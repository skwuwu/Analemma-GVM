[package]
name = "gvm-cli"
version = "0.1.0"
edition = "2021"
description = "CLI tool for the Analemma Governance Virtual Machine"
license = "Apache-2.0"

[[bin]]
name = "gvm"
path = "src/main.rs"

[dependencies]
gvm-types = { path = "../gvm-types" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
reqwest = { version = "0.12", features = ["json"] }
gvm-sandbox = { path = "../gvm-sandbox" }
url = "2"

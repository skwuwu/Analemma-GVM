# CI: tests, lint, security, and format checks on every push/PR.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Security: check dependencies for known CVEs
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked || true
      - run: cargo audit

  # Security: license compliance + banned crates + duplicate deps
  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked || true
      - run: cargo deny check

  # Security: report unsafe code usage across all crates
  geiger:
    name: Unsafe Report
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory, not blocking
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-geiger --locked || true
      - name: Report unsafe usage
        run: |
          echo "## Unsafe Code Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo geiger --all-features --all-targets 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Contained mode: Docker-based isolation smoke test
  contained-smoke:
    name: Contained Smoke (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build proxy + CLI
        run: cargo build --release -p gvm-proxy -p gvm-cli

      - name: Build agent Docker image
        run: docker build -t gvm-agent:latest -f Dockerfile.agent .

      - name: Run contained smoke test
        run: |
          # Start proxy in background
          ./target/release/gvm-proxy --config config/proxy.toml &
          PROXY_PID=$!
          sleep 3

          # Verify proxy is healthy
          STATUS=$(curl -sf http://127.0.0.1:8080/gvm/health | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['status'])")
          [ "$STATUS" = "healthy" ] || { echo "Proxy unhealthy: $STATUS"; exit 1; }

          # Create test agent that makes an HTTP request through the proxy
          AGENT_SCRIPT=$(mktemp /tmp/gvm-contained-ci-XXXX.py)
          cat > "$AGENT_SCRIPT" << 'AGENT'
          import os, requests
          proxy = os.environ.get("HTTP_PROXY", "")
          print(f"PROXY_VARS: HTTP_PROXY={proxy}")
          try:
              r = requests.get("http://api.github.com/repos/torvalds/linux",
                  proxies={"http": proxy, "https": proxy}, timeout=10)
              print(f"STATUS:{r.status_code}")
          except Exception as e:
              print(f"ERR:{e}")
          AGENT

          # Run contained agent
          OUTPUT=$(./target/release/gvm run --contained "$AGENT_SCRIPT" 2>&1 || true)
          echo "$OUTPUT"

          # Verify the proxy saw the request (check WAL)
          if [ -f data/wal.log ] && grep -q "api.github.com" data/wal.log; then
            echo "✓ Contained agent traffic routed through proxy (WAL recorded)"
          else
            echo "⚠ WAL does not contain api.github.com — checking proxy logs"
          fi

          # Verify health still OK after contained run
          STATUS=$(curl -sf http://127.0.0.1:8080/gvm/health | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['status'])")
          echo "Post-test health: $STATUS"

          # Cleanup
          rm -f "$AGENT_SCRIPT"
          docker rm -f gvm-agent-agent-001 2>/dev/null || true
          kill $PROXY_PID 2>/dev/null
          echo "Contained smoke passed"

  # Smoke test: build + proxy health check + SRR policy check
  e2e-smoke:
    name: E2E Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build proxy
        run: cargo build --release -p gvm-proxy

      - name: Start proxy and run health check
        run: |
          ./target/release/gvm-proxy --config config/proxy.toml &
          PROXY_PID=$!
          sleep 3

          # Health check
          STATUS=$(curl -sf http://127.0.0.1:8080/gvm/health | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "healthy" ] || exit 1

          # SRR policy check (github read = Allow)
          DECISION=$(curl -sf -X POST http://127.0.0.1:8080/gvm/check \
            -H "Content-Type: application/json" \
            -d '{"method":"GET","target_host":"api.github.com","target_path":"/repos/test/test/issues","operation":"test"}' \
            | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['decision'])")
          echo "Policy check: $DECISION"

          # SRR policy check (github delete = Deny)
          DENY=$(curl -sf -X POST http://127.0.0.1:8080/gvm/check \
            -H "Content-Type: application/json" \
            -d '{"method":"DELETE","target_host":"api.github.com","target_path":"/repos/test/test/git/refs/heads/main","operation":"test"}' \
            | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['decision'])")
          echo "Delete branch: $DENY"

          kill $PROXY_PID 2>/dev/null
          echo "E2E smoke passed"
